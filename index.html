<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Boutique Premium</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f9;
        color: #333;
        text-align: center;
        padding: 20px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        padding: 10px 30px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 30px;
      }
      .panier {
        font-size: 18px;
        background: #0070f3;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
      }
      .panier-total {
        font-weight: bold;
        color: #ffd700; /* Couleur dorée pour l'argent */
        margin-left: 10px;
      }
      
      #liste-produits {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }
      .produit {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        width: 250px;
      }
      .emoji-img {
        font-size: 60px;
        margin: 10px 0;
      }
      button {
        background-color: #0070f3;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
        width: 100%;
        transition: 0.2s;
      }
      button:hover {
        background-color: #005bb5;
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    
    <div class="header">
      <h1>Ma Boutique Premium 🛍️</h1>
      <div class="panier">
        🛒 <span id="compteur-panier">0</span> article(s)
        <span class="panier-total">- Total: <span id="prix-total">0.00</span> €</span>
      </div>
    </div>
    
    <div id="liste-produits">
      <p>Chargement des produits depuis le serveur FastAPI...</p>
    </div>

    <script>
      // GESTION DU PANIER INTELLIGENT
      let nombreArticles = 0;
      let prixTotal = 0.0;
      
      // La fonction reçoit maintenant le prix de l'article cliqué
      function ajouterAuPanier(prixDuProduit) {
        nombreArticles = nombreArticles + 1;
        prixTotal = prixTotal + prixDuProduit; // On additionne le prix
        
        // On met à jour l'affichage sur la page
        document.getElementById('compteur-panier').innerText = nombreArticles;
        document.getElementById('prix-total').innerText = prixTotal.toFixed(2); // .toFixed(2) garde 2 chiffres après la virgule
      }

      // CONNEXION À PYTHON (FASTAPI)
      fetch('/api')
        .then(response => response.json())
        .then(produits => {
          const conteneur = document.getElementById('liste-produits');
          conteneur.innerHTML = ''; 

          produits.forEach(produit => {
            const div = document.createElement('div');
            div.className = 'produit';
            // Regarde le bouton : on lui passe maintenant ${produit.prix} !
            div.innerHTML = `
              <div class="emoji-img">${produit.image}</div>
              <h2>${produit.nom}</h2>
              <p>Prix : <strong>${produit.prix.toFixed(2)} €</strong></p>
              <button onclick="ajouterAuPanier(${produit.prix})">Ajouter au panier</button>
            `;
            conteneur.appendChild(div);
          });
        });
    </script>
  </body>
</html>
